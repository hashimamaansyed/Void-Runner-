<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Runner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #000000, #0a0a20);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 10px #00f2ff;
            letter-spacing: 1px;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            text-align: center;
            z-index: 20;
            transition: opacity 0.3s;
        }

        h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px #00f2ff;
            letter-spacing: 4px;
            line-height: 1.2;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        button {
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transition: all 0.2s;
        }

        button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.8);
            transform: scale(1.05);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Glitch effect for Game Over */
        .error-text {
            color: #ff3333;
            text-shadow: 2px 2px 0px #550000, 0 0 20px #ff0000;
        }
        
        .error-btn {
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }
        
        .error-btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 51, 51, 0.8);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="hud">
            <div id="scoreDisplay">SCORE: 0</div>
            <div id="speedDisplay">WARP: 100%</div>
        </div>
    </div>

    <div id="startScreen" class="screen">
        <h1>Void<br>Runner</h1>
        <p>Use ARROWS or TAP screen sides to dodge.</p>
        <p id="highScoreStart">High Score: 0</p>
        <button id="startBtn">Initiate</button>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <h1 class="error-text">System<br>Failure</h1>
        <p id="finalScore">Score: 0</p>
        <p id="highScoreEnd">High Score: 0</p>
        <button id="restartBtn" class="error-btn">Reboot</button>
    </div>

    <div id="pauseScreen" class="screen hidden">
        <h1>Paused</h1>
        <button id="resumeBtn">Resume</button>
    </div>

</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');
    const highScoreStartDisplay = document.getElementById('highScoreStart');
    const highScoreEndDisplay = document.getElementById('highScoreEnd');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const pauseScreen = document.getElementById('pauseScreen');
    const resumeBtn = document.getElementById('resumeBtn');

    const HIGH_SCORE_KEY = 'voidRunnerHighScore';

    // Game State
    let isPlaying = false;
    let isPaused = false;
    let isBoosting = false;
    let score = 0;
    let highScore = localStorage.getItem(HIGH_SCORE_KEY) || 0;
    let gameSpeed = 5;
    let warpPercentage = 100;
    let width, height, cx, cy;

    // 3D Settings
    const FOV = 600;
    const LANE_WIDTH_3D = 600;

    // Resize handling
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        cx = width / 2;
        cy = height / 2;
    }
    window.addEventListener('resize', resize);

    function project(x, y, z) {
        const scale = FOV / (FOV + z);
        const x2d = (x * scale) + cx;
        const y2d = (y * scale) + cy;
        return { x: x2d, y: y2d, scale: scale };
    }

    function updateHighScoreDisplay() {
        highScoreStartDisplay.innerText = `High Score: ${highScore}`;
        highScoreEndDisplay.innerText = `High Score: ${highScore}`;
    }

    // Entities
    const player = {
        lane: 1, // 0, 1, 2
        x: 0, // 3D world X
        y: 200, // 3D world Y (on the "floor")
        z: 100, // Distance from camera
        width: 80,
        height: 40,
        roll: 0, // For lane-switch animation
        shielded: false
    };

    let asteroids = [];
    let stars = [];
    let orbs = [];
    let powerups = [];
    let particles = [];

    // Input
    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        if (e.key === 'ArrowLeft' && player.lane > 0) {
            player.lane--;
            player.roll = -0.45; // Radians for roll
        } else if (e.key === 'ArrowRight' && player.lane < 2) {
            player.lane++;
            player.roll = 0.45; // Radians for roll
        } else if (e.key === 'ArrowUp') {
            isBoosting = true;
        } else if (e.key === 'Escape' && isPlaying) {
            togglePause();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowUp') {
            isBoosting = false;
        }
    });

    function initStars() {
        stars = [];
        for (let i = 0; i < 500; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 8000,
                y: (Math.random() - 0.5) * 8000,
                z: Math.random() * 5000,
                size: Math.random() * 2 + 0.5
            });
        }
    }

    function spawnAsteroid() {
        const lane = Math.floor(Math.random() * 3);
        const isDiagonal = Math.random() < 0.25; // 25% chance of being diagonal

        if (isDiagonal) {
            asteroids.push({
                type: 'diagonal',
                lane: lane, // for starting position
                x: (lane - 1) * LANE_WIDTH_3D,
                y: 200,
                z: 5000,
                size: 120 + Math.random() * 40, // slightly smaller but faster
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.2,
                velocityX: (Math.random() > 0.5 ? 1 : -1) * 15
            });
        } else {
            asteroids.push({
                type: 'normal',
                lane: lane,
                x: (lane - 1) * LANE_WIDTH_3D,
                y: 200,
                z: 5000,
                size: 150 + Math.random() * 50,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.1
            });
        }
    }

    function spawnOrb() {
        const lane = Math.floor(Math.random() * 3);
        orbs.push({
            lane: lane,
            x: (lane - 1) * LANE_WIDTH_3D,
            y: 200,
            z: 5000,
            size: 30
        });
    }

    function spawnShield() {
        const lane = Math.floor(Math.random() * 3);
        powerups.push({
            type: 'shield',
            lane: lane,
            x: (lane - 1) * LANE_WIDTH_3D,
            y: 200,
            z: 5000,
            size: 40
        });
    }

    function togglePause() {
        if (!isPlaying) return;
        isPaused = !isPaused;
        if (isPaused) {
            pauseScreen.classList.remove('hidden');
        } else {
            pauseScreen.classList.add('hidden');
        }
    }

    function update() {
        if (!isPlaying || isPaused) return;

        // Difficulty scaling
        let baseSpeed = 40 + (score / 100);
        gameSpeed = isBoosting ? baseSpeed * 2 : baseSpeed;
        warpPercentage = Math.min(999, Math.floor((100 + (score / 10)) * (isBoosting ? 2 : 1)));

        // Smooth Player Movement & Roll
        const targetX = (player.lane - 1) * LANE_WIDTH_3D;
        player.x += (targetX - player.x) * 0.15;
        
        // Damping Logic
        player.roll *= 0.8;

        // Rotation Limits
        if (player.roll > 0.45) player.roll = 0.45;
        if (player.roll < -0.45) player.roll = -0.45;

        // Lane-Switch Snap
        if (Math.abs(targetX - player.x) < 1) {
            player.roll = 0;
        }

        // Stars
        stars.forEach(star => {
            star.z -= gameSpeed;
            if (star.z <= 0) {
                star.z = 5000;
                star.x = (Math.random() - 0.5) * 8000;
                star.y = (Math.random() - 0.5) * 8000;
            }
        });

        // Spawn Particles from engine
        if (particles.length < 150) { // Limit total particles
            for (let i = 0; i < 3; i++) {
                const p = {
                    x: player.x + (Math.random() - 0.5) * 10,
                    y: player.y,
                    z: player.z + 20,
                    lifespan: 20 + Math.random() * 20,
                    size: Math.random() * 2 + 1
                };
                p.initialLifespan = p.lifespan;
                particles.push(p);
            }
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.z -= gameSpeed; // Move with the world
            p.lifespan--;
            if (p.lifespan <= 0) {
                particles.splice(i, 1);
            }
        }

        // Shield Powerups
        if (Math.random() < 0.005 && powerups.length === 0) { // Very rare, only one at a time
            spawnShield();
        }

        for (let i = powerups.length - 1; i >= 0; i--) {
            let p = powerups[i];
            p.z -= gameSpeed;

            // Collection Detection
            if (p.z < player.z + 50 && p.z > player.z - 50) {
                if (p.lane === player.lane) {
                    player.shielded = true;
                    powerups.splice(i, 1);
                    continue;
                }
            }

            if (p.z < -FOV) {
                powerups.splice(i, 1);
            }
        }

        // Orbs
        if (Math.random() < 0.01) { // Spawn orbs less frequently
            if (orbs.length < 3) { // Limit number of orbs on screen
                spawnOrb();
            }
        }

        for (let i = orbs.length - 1; i >= 0; i--) {
            let o = orbs[i];
            o.z -= gameSpeed;

            // Collection Detection
            if (o.z < player.z + 50 && o.z > player.z - 50) {
                if (o.lane === player.lane) {
                    score += isBoosting ? 500 : 250; // Orbs are worth more
                    orbs.splice(i, 1);
                    continue; // Skip to next orb
                }
            }
            
            if (o.z < -FOV) {
                orbs.splice(i, 1);
            }
        }

        // Asteroids
        if (Math.random() < 0.03 + (score / 100000)) {
            // Prevent overlapping spawns too close
            if (asteroids.length === 0 || asteroids[asteroids.length - 1].z < 4000) {
                spawnAsteroid();
            }
        }

        for (let i = asteroids.length - 1; i >= 0; i--) {
            let a = asteroids[i];
            a.z -= gameSpeed;
            a.rotation += a.rotSpeed;
    
            // Handle diagonal movement
            if (a.type === 'diagonal') {
                a.x += a.velocityX;
                const wallBoundary = LANE_WIDTH_3D * 1.5;
                if (a.x > wallBoundary || a.x < -wallBoundary) {
                    a.velocityX *= -1;
                }
            }
    
            // Collision Detection
            if (a.z < player.z + 100 && a.z > player.z - 100) {
                let collision = false;
                if (a.type === 'diagonal') {
                    // Check X-axis proximity for diagonal asteroids
                    if (Math.abs(a.x - player.x) < LANE_WIDTH_3D / 2) {
                        collision = true;
                    }
                } else { // For normal asteroids
                    if (a.lane === player.lane) {
                        collision = true;
                    }
                }
    
                if (collision) {
                    if (player.shielded) {
                        player.shielded = false; // Shield is used up
                        asteroids.splice(i, 1); // Destroy the asteroid
                    } else {
                        gameOver();
                    }
                }
            }
            if (a.z < -FOV) {
                asteroids.splice(i, 1);
                score += isBoosting ? 200 : 100;
            }
        }

        // UI
        scoreDisplay.innerText = `SCORE: ${score}`;
        speedDisplay.innerText = `WARP: ${warpPercentage}%`;
    }

    function draw() {
        // Clear
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, width, height);

        // Draw Stars
        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            const p = project(star.x, star.y, star.z);
            if (p.scale <= 0) return;
            ctx.globalAlpha = (1 - (star.z / 5000)) * (Math.random() * 0.5 + 0.5);
            ctx.beginPath();
            ctx.arc(p.x, p.y, star.size * p.scale, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Lanes
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)';
        ctx.lineWidth = 2;
        
        const boundaries = [-1.5, -0.5, 0.5, 1.5];
        boundaries.forEach(b => {
            const x = b * LANE_WIDTH_3D;
            const p1 = project(x, 200, 0);
            const p2 = project(x, 200, 5000);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        });

        // Draw Shield Powerups
        powerups.forEach(p => {
            if (p.z < 0) return;
            const proj = project(p.x, p.y, p.z);
            const size = p.size * proj.scale;

            ctx.save();
            ctx.translate(proj.x, proj.y);
            
            // Draw a hexagon for the shield
            ctx.strokeStyle = '#00f2ff';
            ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.lineWidth = 3 * proj.scale;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const hx = Math.cos(angle) * size;
                const hy = Math.sin(angle) * size;
                if (i === 0) {
                    ctx.moveTo(hx, hy);
                } else {
                    ctx.lineTo(hx, hy);
                }
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        });

        // Draw Particles
        ctx.globalCompositeOperation = 'lighter';
        particles.forEach(p => {
            if (p.z < 0) return;
            const proj = project(p.x, p.y, p.z);
            if (proj.scale <= 0) return;

            const alpha = p.lifespan / p.initialLifespan;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#00f2ff';
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, p.size * proj.scale, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;
        ctx.globalCompositeOperation = 'source-over';


        // Draw Orbs
        ctx.globalCompositeOperation = 'lighter'; // Additive blending for glow
        orbs.forEach(o => {
            if (o.z < 0) return;
            const proj = project(o.x, o.y, o.z);
            const size = o.size * proj.scale;
            
            const gradient = ctx.createRadialGradient(proj.x, proj.y, 0, proj.x, proj.y, size);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.4, 'rgba(0, 242, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 242, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; // Reset blending mode

        // Draw Player
        const pp = project(player.x, player.y, player.z);
        const pScale = pp.scale;
        const pW = player.width * pScale;
        const pH = player.height * pScale;

        ctx.save();
        ctx.translate(pp.x, pp.y);
        ctx.rotate(player.roll);

        // Draw shield effect around player if active
        if (player.shielded) {
            ctx.globalCompositeOperation = 'lighter';
            const shieldRadius = (player.width / 2 + 20) * pScale;
            const shieldGradient = ctx.createRadialGradient(0, 0, shieldRadius * 0.5, 0, 0, shieldRadius);
            shieldGradient.addColorStop(0, 'rgba(0, 242, 255, 0)');
            shieldGradient.addColorStop(0.8, 'rgba(0, 242, 255, 0.5)');
            shieldGradient.addColorStop(1, 'rgba(255, 255, 255, 0.8)');
            
            ctx.fillStyle = shieldGradient;
            ctx.beginPath();
            ctx.arc(0, 0, shieldRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.globalCompositeOperation = 'source-over';
        }

        // Engine Trail
        ctx.fillStyle = '#00f2ff';
        ctx.beginPath();
        ctx.moveTo(-15 * pScale, 0);
        ctx.lineTo(0, (80 + Math.random() * 20) * pScale);
        ctx.lineTo(15 * pScale, 0);
        ctx.fill();

        // Ship Body (3D Pyramid)
        // Left Face
        ctx.fillStyle = '#dddddd';
        ctx.beginPath();
        ctx.moveTo(0, -pH); // Nose
        ctx.lineTo(-pW/2, 0); // Left Wing
        ctx.lineTo(0, -pH/2); // Top (raised)
        ctx.closePath();
        ctx.fill();

        // Right Face
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(0, -pH); // Nose
        ctx.lineTo(pW/2, 0); // Right Wing
        ctx.lineTo(0, -pH/2); // Top
        ctx.closePath();
        ctx.fill();

        ctx.restore(); // Restore from player rotation

        // Draw Asteroids
        asteroids.sort((a, b) => b.z - a.z); // Draw far to near
        asteroids.forEach(a => {
            if (a.z < 0) return;
            const proj = project(a.x, a.y, a.z);
            const scale = proj.scale;
            ctx.save();
            ctx.translate(proj.x, proj.y);
            ctx.rotate(a.rotation);
            
            // 3D Asteroid (Extrusion)
            const r = (a.size / 2) * scale;
            
            // Shadow/Side
            ctx.fillStyle = '#333344';
            ctx.beginPath();
            for(let i=0; i<=7; i++) {
                const angle = (i/7) * Math.PI * 2;
                const dist = r; 
                const px = Math.cos(angle) * dist;
                const py = Math.sin(angle) * dist;
                const depth = 15 * scale;
                if (i===0) ctx.moveTo(px + depth, py + depth); 
                else ctx.lineTo(px + depth, py + depth);
            }
            ctx.closePath();
            ctx.fill();

            // Top Face
            ctx.fillStyle = '#666677';
            ctx.strokeStyle = '#888899';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for(let i=0; i<=7; i++) {
                const angle = (i/7) * Math.PI * 2;
                const dist = r;
                const px = Math.cos(angle) * dist;
                const py = Math.sin(angle) * dist;
                if (i===0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function startGame() {
        console.log('Game Started');
        score = 0;
        gameSpeed = 40;
        asteroids = [];
        orbs = [];
        powerups = [];
        particles = [];
        player.lane = 1;
        player.x = 0;
        player.roll = 0;
        player.shielded = false;
        isPlaying = true;
        isPaused = false;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        pauseScreen.classList.add('hidden');
        initStars();
    }

    function gameOver() {
        isPlaying = false;
        finalScoreDisplay.innerText = `Final Score: ${score}`;

        if (score > highScore) {
            highScore = score;
            localStorage.setItem(HIGH_SCORE_KEY, highScore);
        }
        updateHighScoreDisplay();
        gameOverScreen.classList.remove('hidden');
    }

    window.onload = function() {
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        resumeBtn.addEventListener('click', togglePause);

        window.addEventListener('touchstart', (e) => {
            if (!isPlaying || isPaused) return;

            // Prevent default browser actions like scrolling or zooming
            e.preventDefault();

            const touchX = e.touches[0].clientX;

            if (touchX < window.innerWidth / 2) {
                // Left side tap
                if (player.lane > 0) {
                    player.lane--;
                    player.roll = -0.45;
                }
            } else {
                // Right side tap
                if (player.lane < 2) {
                    player.lane++;
                    player.roll = 0.45;
                }
            }
        }, { passive: false });

        // Initial setup
        resize();
        // Start loop immediately for background effect
        updateHighScoreDisplay();
        initStars();
        loop();
    };

</script>
</body>
</html>
